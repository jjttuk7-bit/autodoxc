services:
  postgres:
    # pgvector를 빌트인으로 가지는 공식 이미지 (Postgres 16 기반)
    image: pgvector/pgvector:pg16
    container_name: autodoxc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autodoxc
      POSTGRES_USER: autodoxc
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../src/backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodoxc -d autodoxc"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
